body:
  text: 生玄珠章玄珠法者取白金一十四兩至一斤已下須是不經鍊者可用如得復令金木相會心須不亂無求别意又用陰陽數為之綱紀九九之數足則是如木覺欲敗使金制不令動然後閉目偃脊縮腹翕氣十指如鈎上搐元氣更不得動搖神思良久候定乃再為之再準前法制令青龍真氣不泄歸於元宫準此依時行十六度結為玄珠又玄珠者是四象真氣共聚而成夫四象者自金木而有矣木即是青龍龍即是陽金即是虎虎即是陰陰中有真精是鉛陽中有真精是汞鉛能住汞汞又戀鉛鉛汞相投自然相感玄珠無不就也故先用密機取真鉛返歸青龍元宫住故汞亦自然留住也又鉛汞者是龍虎至精之窟宅龍虎氣若得鉛汞自然共聚為之感結號為玄珠為何知緣先結伏真鉛在青龍元宫後復令金木相會木受金尅性情必動動則氣降降則欲泄制之不令出泄又不能返本位而不能飛騰復為根祖故却入宫與汞相合結為玄珠成就於臍下大熱如火燒鍋釜也玄珠結金丹章再令金木相會須是細意審詳候金虎情極動而意動不可禁制十分急奔於木然後放玄珠過入交感宫其宫屬土方具五行三十日氣圓方得體象俱足乃奪天地三百日造化上下俱全可得成就號曰金丹十月滿足自左乳脅下而生大小如櫻桃體如鮮血紅紫有光彩射人此金丹也當時白虎受得玄珠於交感穴此與常時氣不同大忌憂喜寒熱恐怒飢飽爭競如有此犯必致毁壞也然須日常安付不令毁動專候丹氣圓臨欲落時用淨器收之香水浴過結就氣備淨心上壇捧丹從地户而上達壇三匝面北而立仰謝太上老君太上道君太上元始天尊吞之永鎮元宫故曰存神住氣回精上朝於腦令上下氣通丹氣往來自然造化暗换筋骨皮毛入於聖道緣金丹者能變换法界乾坤超凡入聖使通上下氣關節俱開金丹氣往來暗换凡軀變為仙體人得食者三年之內凡體變盡厥號真人飛升自在上朝元始天尊的不謬焉故用三萬六千精光神一萬二千形影神一萬二千真氣神一萬二千出入神隨從侍衛縱橫自在此蓋是陰陽二氣所出二氣主於四象四象立五行五行生萬物萬物者萬神也金液白膏成立大道章金液白膏者是四象真氣所化者也四象者龍虎相合鉛汞結伏配入中宫而具五行又龍虎者真陰真陽陽中有三陰神氣精陰中有三陽神氣精即坎艮震巽離兌陰中有三陽中有三共為六配龍虎為八每一八又生八八八六十四卦內生六十四神每卦有六神爻合三百八十四爻身內生三百八十四神每一陰神一陽神相合復生三百八十四神故生周身三萬六千神此蓋即陰陽所生四象四象生五行五行生萬物只如人身初受二氣於母腹中三十日氣備於雙乳下生膜上出金液之津是為金液白膏也既得此膏灌溉自然奪天地造化方得成人身既欲修身豈離金液白膏乎且如人初受二氣於母元宫便去雙乳下生金液白膏今返受二氣於自己元宫金液白膏從何處出然金液白膏是陰陽五行真氣造化但將陰陽五行之氣聚其白膏自然生也如陰陽氣聚得五行真氣從丹田中生自坎宫上朝舌下二竅中出將金液白膏鍊陰陽三元五行數足凝結為白膏也其膏便隨榮衛運轉經絡周身至元宫灌溉所聚者神氣精也此神氣精乘此白膏元氣流轉通靈暗奪天地造化换於筋骨皮毛三年變盡凡體立出一箇神仙的不謬矣且如金丹大藥採氣及一切氣皆不離於金液白膏變化者也且後來學人未識天地根本而且將此見在神氣精修金丹依法施為能知其法功若不缺亦能超於常壽變改衰顔何況更從根本而修則成神仙如觀掌矣日月交合時日去住法章夫人修攝者須明日月行動何謂也緣天地以日月為用人以榮衛為用學人但依內日月為外日月轉動不差即便壽同天地且天地交以律吕五行之氣日月交合以産萬物而生成日月交而氣不交反為身田之害日月行而氣不行令人漸漸衰老疾病但將榮衛效日月之行動主掌於身內無由得成衰老自然久視長生只如天長地久者蓋日月星三奇主張夫日月星者是天地至精號曰三奇晝若無日夜若無月星何處更存乎天地也人之三奇者神氣精也人若神去精竭氣絶何處更存乎人也神者榮衛之氣榮即是日衛即是月如外日月會內便使氣合如外日月行內便使氣行自然壽同天地不更衰老如更能鍊丹藥無不至天地者也又日月行動者三十日各有一法太陽一日十二時只應九時三時不應三十日共得三百六十時內應二百七十時九十時不應且太陰三十日只眀二十四日前後共六日不現緣太陰生於申其氣逆行至戌亥子三宫是純陰之所在太陰之密室三十日內前三日後三日太陰行至本宫不出本宫戌亥子三宫是也至本宫而住故不明也太陽生於寅順行至戌亥子三宫於太陰位次遇二氣相交故不應從二十七日至初三日共六日之內為日月交姤時故太陰不明太陽不應至本宫而住故不眀也學人如得氣備者使內與外相合但當日月交時榮衛亦交日月行時榮衛亦行是內外相合也前三日後三日太陰辰時方與太陽别太陰元宫至本宫前四日至八日後二十三日至二十七日太陽丑時與太陰别太陰前三日初出於庚上後二十七日漸沒前八日至二十三日太陽癸時與太陰别太陰氣圓故盛眀於世日月氣候共運天地氣候不差分杪故得天長地久學人但依此法令榮衛合日月運動於身氣候不差即便壽同天地日月也此三十日內日月榮衛所治之法也三元立命日月氣交合太陰真氣降逐日下時作用章每行此功於朔後一日至三日癸時起功至戌時住四日至八日丑時起功戌時住九日至二十三日艮時起功至戌時住二十四日至二十七日丑時起功至戌時住二十八日至三十日癸時起功至戌時住此為太陰與太陽一日十二時中戌亥子相合人之榮衛亦然也故遇此三時須是住功令榮衛交合已上行運轉功須是氣候足方可再行先從肺藏行之逐藏並須通肺氣入中宫三十五口滿七轉傳腎腎入中宫三十五口傳肝肝入中宫二十五口滿傳入心心入中宫十五口滿傳入脾藏得一百二十口正數謂之一周天便閉氣候力極不任咽送至元宫一日行火二日通氣三要助於榮衛行滿一十六周天為一功一日十二時九時行功三時住功滿一十六轉得陰陽氣備至三十日內其氣凝實三百日造化自全但依此功自然準的夫太陰真氣者白虎真鉛也是萬物之母遇太陽真氣降亦降太陰真氣伏亦伏即降為杳冥杳冥之內太陰真氣所住也太陰氣降有時有日若日時不合而用者萬萬中無一得道也蓋緣太陰真氣伏降何須苦意强求但令依其氣降日時大事無不成也每朔前二十八日至朔後初三日此六日是太陰交合日故太陽真氣降來往六日各逐日下功有時朔後一日與三十日癸時真氣來至丑時聚艮時散初二日與二十九日子時真氣來癸時聚丑時散初三日與二十八日壬時來子時聚癸時散凡取真鉛須候氣來即取氣聚則合氣散則運若差毫釐即功無益只如人運丹與見在神氣並須氣來即取氣聚即合氣散即運來而不取氣滯聚而不合氣謝散而不運氣堪此暗敗之形體也若不見此機空有萬種行持皆取死之輩也起功定立壇象氣章夫立壇理者正天地之氣候也候作天地之初機者日月五星也日月者太陰太陽也五星者五行也若日月五星運轉天地氣候不差則四時自然成規矩也人之樞機者榮衛五藏也若得榮衛五藏合度即四時無不應候日月五行分行七氣榮衛五藏亦行七氣也則循環三百六十日合得一周天之數立五日一候四十五日一節九十日一氣五日一候者為六十甲子神行事每一日分十二辰故立十二時者得六十時六甲神氣周遍數足乃從五甲子神復用故曰五日一候三百六十日共得七十二候人若得氣候不差亦然也四十五日一節者謂一日有十二時六時陰六時陽配晝夜為節即為八卦此八卦是一日之用神也人亦有十二位元神名六陰神六陽神配合榮衛為八卦亦是一日之用神也四十五日合得三百六十時正數故謂之一節三百六十時共得八節九十日為一氣者謂四十五日得三百六十神之氣用九十日共得七百二十故謂之一氣三百六十日共有四氣人亦然也若能用榮衛五藏運轉周身往來無滯合天地運動於身自然分五日一候四十五日為節九十日為一氣與天之氣不差分杪無不達也蓋為不知天地之氣候行動運轉身田真氣曾犯破元神神氣不足故與外氣不能相合人若無犯破者神與氣全只投此機用依日月氣候交合定刻漏不差無不達也若人曾犯破元神者捉得根本來處而修却補令氣備神全精足依法而修無不達也定十二時分刻漏四象真氣聚散章夫天地運轉者以刻漏為準起功定位分刻漏之綱者一日分定百刻百刻者於十二時上分配子午卯酉四位各分九刻寅申已亥辰戌丑未八位各分八刻四九三十六八八六十四共計一百刻定晝夜氣候從子為一陽起首是陽氣生之始也午後為一陰是陰氣長之初也至卯為盛陽之至也子者位應北方壬癸水卦主坎其象玄武水神也午者位合南方丙丁火卦主離其象朱雀火神也卯者位應東方甲乙木卦主震其象青龍木神也酉者位應西方庚辛金卦主兊其象白虎金神也此四象者生成世界長立乾坤為天地之主謂之四象故於本位各占九刻寅申已亥辰戌丑未各管八刻此八者謂八卦為四象之輔佐隨四氣而行休旺凡行三元正氣須推刻為憑若一刻有差則真氣不能凝結且如朔後三十日是天地氣合以日月運轉生成於萬物之中合得天地氣候各逐本性隨順陰陽變化只如人身初受四象真氣凝結充實奪天地造化成人若不暗合陰陽交感機宜如何得四象凝結聚成若內外機宜相合自然從無入有造化成人是知人身難得今將有質之軀奪天地陰陽造化氣候性情往來升降聚散合刻漏造化修鍊此理甚易且如朔後一日與三十日癸時太陰真氣降來便將內氣與外氣相合若不見定刻漏之法則癸時從何而準定且癸在子後丑前各以心中為準此見必有差也子管九刻丑管八刻但於子後四刻半即屬癸時太陰真氣降來接氣降便取癸後四刻屬丑管真氣聚也便合丑後四刻屬艮管其氣散也接散而便運轉次後百刻準此作用故天地造化以刻漏為準則此也奪三十日積閏大功章謂三年之內有積閏三十日奪積閏為三十日大功此法出於三年之外若到此者神仙不遠且為小徑之捷利所言三十日大功者謂三年內有一閏蓋天地造化氣滿內有積盛之氣三年內可積三十日號曰餘閏氣倍法修功便將三十日天地氣俱備三百日造化萬象俱全只如人初受氣於母腹中亦三十日形體俱備三百日造化形象俱圓然後降世為人又三年乳哺可得成形若解將此三十日餘氣依法而修持三十日便得真性凝聚立具靈通故日大功若此功就可以坐在立亡飛靈走聖入户穿窗隨意立至故法曰須得同道三人缺一不可為緣下功至十五日已後則真性欲離於殼也故須得一人只在於身畔逐時呼唤時中定刻漏逐刻餐哺若或失刻應是不回也何謂本元真性離凡軀殼然後復醒當時二氣聚日造化之事從無入有以成身形然後降世欲效玄機身法修鍊要作神仙及降世後被榮衛氣障迷更不記修身造化機法真性既離凡軀而後復性身受濁染恐不回來故須一人逐時呼唤真性既聞人呼唤知身下功却又回來至二十日已後逐日真性自現本形離體忽有忽無至二十六日體象未形謂之太易易者合也方合有無至二十七日元氣始萌謂之太初初者萌也初覺有體至二十八日形氣方端的謂之太始方端的者直性始具形端至二十九日形體變有質謂之太素真形已具於形質素白而現至三十日真性形質已具謂之太極形質極備真性脫質成形往來無障到此雖知未達於神仙實小聖之利便也如修此法須依刻漏為準所有刻漏法細分在前凡下功處須是四顧寬容平廣立壇三層所有壇理亦分在前壇象及定刻圖又目於後去層壇外定十二位分各於本位上依本數定一周計一百刻專令一人在壇心坐逐刻報應假令春三月甲子日後夜半子時起功緣亥管八刻子管九刻前三刻又犯榮衛交正子時又失刻須是亥後三刻半屬子管子後四刻半又屬丑管丑後四刻又屬寅管須是呼唤哺食取白膏為用白膏者取頭首生兒者也乳汁每升管白沙蜜二斤射香半兩朱砂一兩乳香半兩龍腦半兩已上共細研為散入瓷瓮子中取白米淨淘浴用麵拌勻入甑中藥瓮子內蒸熟為度從下功日每日十二時每時食一匙至五日後逐日加半匙至十日後加兩匙至十五日加至兩匙半至二十日加至三匙已後不加二十六日已後真性離身現本形能談論到此時大功顯驗也混元八景真經卷之五
