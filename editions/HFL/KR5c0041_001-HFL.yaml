body:
  text: 混元八景眞經卷之一二同卷女六混元眞人曰夫天地以前混沌之初萬彙未萌空而無洞只是虛無虛無之中有景氣景氣極而生杳冥杳冥極方有潤濕潤顯之極始結成霧露霧露之極方變水水流霧下其水滿流水者陰氣陰極始生陽氣陽氣漸上炎熱方結爲火火從水生水火相交即漸相䨱二物交泰各生積氣積氣所生陰陽相鍊其數滿足始結爲混沌混沌既就方爲一氣一氣所萌方爲天地之母混沌者從虛氣而生也方立陰陽産五行立四象混元氣極混沌始分便生元始元始既生便分積清之氣爲天積濁之氣爲地天地既立乃輕清上爲天重濁下爲地其輕清雖然屬陽却内生陰氣陰氣下降爲地其重濁雖然屬陰却内生陽氣陽氣上騰爲天始天降地騰水火相交陰陽相戰交氣極足方結就太丹太陽是也其陽被天地運轉至有金氣金氣屬陰運轉氣足始生太陰月是也自後日月交泰陰陽相鍊其數滿足漸生星辰自上古至今不離天降地騰陰陽相交日月相合眞氣生産萬物萬物之中惟人最靈最貴所以一生二二生三三生萬物其人并萬物須禀陰陽五行運轉數足方可成就學道者若不知下手於根源來處怎得道成人若依元本修行一依天地陰陽五行水火交泰運轉修養内外相應眞氣滿足何愁不至神至聖至神仙也神仙之道亦有三等每等又分三等三三始九故有九等神仙且上三等神仙者要行觀天之道則一依天地初生之行度氣候滿足方可命長也其功爲是難謂此道須得不犯破三奇者可依天地行度内外相應大功了畢得成上等眞人之位也如少年曾犯破三奇者却採奪離龍元宫陽精補之如舊却修觀天大功之道滿足方爲中等眞人之位如更不用採奪只將見在精氣神候滿足方爲下三等地仙矣以上三品九等神仙之外且有自然金丹金丹者是天地所生其金丹滿世皆有但世人不曉上天秘隱之術學道者萬萬人俱難遇此乃是内金液大還丹也更有丹藥之中最爲上丹也夫内金丹是金液還丹也不出古文諸丹中最爲第一遇此然後從無入有不用人修若所遇則採之服食便可得眞人之位也内金丹者先採日魂月魄合陰陽養用而成凡内金丹者自有五行四象相尅抽添否泰七十二候二十四氣四時八節天地運動相鍊方得成就内金液還丹也其丹亦如爛櫻桃在離龍金堂内成之三千六百時天符數足方可成熟採取有日有時此丹上天隱秘最爲難遇自軒轅之後得道神仙皆服此丹得離囂塵名爲眞仙也後若有知命學道之人遇至人指訣得成此丹更加脩功鍊德造善一切虚事勿行功行滿足得遇此丹若不除舊乖立有禍生前功盡毁遇此丹者上有三清上聖及諸洞神仙立便知聞須是萬般捨棄去除三毒先以潔淨腸胃採得將來用淨室一間四面燒香不住拜求志告發誓上清並無外意方可服之點化凡軀服一粒萬病消除服二粒散入遍體服三粒行如奔馬服四粒髮白變黑服五粒老者還童服六粒顔貌如嬰兒服七粒意去便到百神來迎服至八粒身有紅光足下雲生服至九粒羽化爲上等眞人萬般無礙如金液還丹者内外有兩般外還丹者是日魂月魄爲首東方木精爲根西方金精爲本兩般生就黃芽若立爐鼎擇地築壇採得眞氣入鼎中從無入有氣候無差五日一候三候一氣一月兩氣十二月二十四氣四時八節水火中氣晦朔弦望陰陽交泰依天地造化之功奪氣候滿足開壇取藥服之長生也此是外丹之驗也只如修身之法丹成爲妙諸丹藥中萬萬人修之不見成就者蓋其爲法功大難於修養所以千萬人中未有一人了畢也唯有内丹者天地自然成就只是採日時用機採得將來依法服之便爲長生之人也如要還此丹者至誠燒香上告三清頻祝老君啓南辰北斗日月星辰重發大願萬事俱捨一心志求不得退心須望遭遇此丹只在目前至人不遠若有的實知命不苟之人道心不退積善圓滿必遇至人指訣天機也後方入混沌之源其經顯露至七分令人省會大半神仙事跡先用三機初機命機天機次用三乘三乘者上乘中乘下乘都行九品九品者金丹三品大藥三品大功三品大數十二教十二教者金丹有三大藥有三大功有三超乘有三實縁在下此者從虚無入至混沌生天地日月星辰人物等世界風雲氣候及物皆從混沌而生也混者溷也沌者昏也混沌之形狀如鷄子上圓下方初分之際散清氣爲天濁氣爲地分生人居其中杳杳冥冥其中有氣若明窗隙中塵也其塵言有又無形質言無又眼觀有景將此有無分立二儀二儀交合産出陰陽陰陽相乘而立三才三才分四象四象列五行五行生萬物故三才者天地人也同一氣而生故問曰人與天地既同禀一氣而生何謂天不崩地不陷而人有死生其謂何也答曰天者陽氣也輕清之氣輕清之外更無輕清獨處於輕清之位故曰天也地者陰氣也重濁之氣重濁之外更無重濁獨處於重濁之位故曰地也人者冲和也非濁非清非重非輕如人修輕清之行即生歸於天如作重濁之因即死歸於地故云陽即是生陰即是死天不崩者元是輕清之氣從輕清而有質其氣純陽氣候所爲只是順陽運陰故天之長乆也如却還行逆氣務爲重濁氣盡而自然崩也天元從輕清而有質豈能返行於重濁乎故知天不崩也地不陷者元是積重濁之氣從重濁而立體其氣純陰氣候所爲只順陰而運陽故地之長乆也如却返行順氣務於輕清氣盡而自然陷也地元從重濁而有形豈能返行於輕清乎故知地不陷也人有生死者蓋失其元和之氣不務根源將自本元純陽眞性只爲世利貪役心機使神氣疲敗精魂漸散既使氣減精羸氣盡而自然死也人處於世只爲聲色利名而用機貪求但是有作爲有形質之物盡屬於陰也人之所行只務於陰故數盡至死而歸於地所以有死即有生人之既死四大各歸來處五行眞氣各歸本方且人元是五行陰陽眞氣所化生而成死則歸於四大其眞氣不能壞故散而各歸於本位本位者人之五藏也若遇陰陽氣合復變化成人故知死者生之根生者死之苗有生即有死若無生即無死人能將本元眞氣順合天道而修行莫差常度則當德合天地不差其理即無生死既無生死即是神仙也如達天機生死自免問曰人欲求長生不死效天地之機不死可得否答曰然陽消陰補物極元補若達根源長生有路若不依根本而修則千悞萬悞矣且人生天地之間不能效天地之長乆者何謂也蓋謂修行不正而有錯路致有生死若見不死之道何處更有死生也既乃不生即免於死既無生無死即同天地之長乆也問曰何謂路正錯答曰但世人處事皆失本元之氣犯破三奇亂役神思乖於制御世人本是神仙之體反變爲凡庶既爲凡庶無縁得長生乆視直至亡形此大錯也若本元無漏神氣無虧三奇晝夜分明神魂安然無著於世與天地同德日月齊明此謂正也問曰如學人曾犯破元神不拘深淺若遇至人指教了達天機依法而修死可去否答曰犯者破也爲犯破元神元神既破其神亡也元神既亡則氣不能足自然不合天地之行動也縱使强爲亦不可行也曰如有至人先曾有犯而後悟者如何曰但先修身然後養命此眞理也夫修身者爲曾犯破元神則氣精不全却候修得眞氣具足神氣俱全方可養命而致神仙也爲精氣神不足便將眞理而行之此强爲之其道難成矣蓋爲内外氣不能相合是理不正也問曰何謂得内外氣相合與天地不差答曰天地者禀一氣而成且人亦是禀一氣而生人與天地皆同一氣而生是何内外氣不相合蓋人未悟之時犯破元神使内氣不足故不能合於外氣但將破漏神精速宜修攝令如舊敗失之氣養令都全然後依本法而修自然内氣合於外氣問曰人身破壞如何修攝答曰然上文舉陽消陰補物極元補只如在世萬物皆不離於金木水火土而成形質假令因木而成器者物致於毁壞但將木而修必得全於依舊若金水火土而修之此乃異類不可爲也假令因土而立者物致於毁壞但將土而修之必復得全於元用金木水火而修皆各氣而不同故不可行也萬物皆效之故曰物極元補只爲人有毁壞但究根源而補氣無不足矣人但修令神氣精足方可養命而致神仙也如神氣精不足而用眞理亦難成矣不見根源妄爲修作皆是異類不可行也根者本也本者基也乃是人立身命之基爲之根本也故曰本立而道生又本者元也元者一也元一之氣故曰本元是父一點眞精傳神受氣氣隨神而行承母一點眞氣二氣相乘方成於道故曰一陰一陽之謂道道生一一生二二生三三生萬物以立乾坤無不備也元一者是生人之根本也根本者是眞陰眞陽也人從此而得生既知人從陰陽而得生至於毁敗失了三奇但却依陰陽之根源夾處而修所失者神氣精自然而足何謂推窮所敗之身元從陰陽而得至於毁壞今却用陰陽氣補失了者神氣精自令依舊人能令精氣神全於身内氣自合於外氣若得内外氣合即便壽同天地更能知於養命修鍊不乆便登神仙問曰雖知毁壞之身從陰陽二氣而得却令取陰陽之氣用修於身其理即明其法如何答曰然大凡修道必先修身身若修全然後養命而致神仙修身之法者是爲微妙之機奪神仙之妙用微機暗取陰陽眞氣補攝毁敗之軀令却全於根本根本與天地合同不差分毫既令修得本元神氣自足神氣既足依本法而修故得長生神仙者也本法者天機也天機本法並依陰陽運動執其氣候而行運動乾坤抽添鉛汞出入往來貫串與内外相應莫令差錯功修一載以具靈通功修二載以具超凡功修三載厥號神仙修身之道法陰陽氣候五行規則並在下卷混元八景眞經卷之一
