body:
  text: 混元八景眞經卷之二勸後學得理者先須修身然後養命必致神仙也如人身不修元氣不足便得眞理而行亦不能逹也謂内氣不足與外氣不貫串相合故其爲道難得逹也問曰上文陽消陰補其元一之氣一者是父之一點眞精傳神受氣乘母之一點眞氣二氣相乘乃成於形只如二氣相乘即是凝珠一顆精從何處造化氣從甚處變通奪天地造化而成人答曰然父者木也精者火也二象元是一氣木即爲主火即爲用母者金也氣者水也金即爲主水即爲用父與母精與氣此四者元是四象遇土即相生不遇土則相尅母之元宫者眞土也四象至此宫自然相順共聚爲寳也各具本性而生性意智慧金者性也木者意也水者智也火者慧也金將本性外立西方内生肺藏木將本意外立東方内生肝藏水將本智外立北方内生腎藏火將本慧外立南方内生心藏土無位無正形隨旺四季象立中宫内生脾藏腎主骨肝主筋脾主肉心主血肺主皮毛肝主目脾主唇肺主鼻腎主耳心主舌膽爲肝府小腸爲心府大腸爲肺府膀胱爲腎府胃口爲脾府此五位各具本位氣用立於本方具前神故得身體全備是五行生萬物之理也人之血肉骨髓皮毛筋齒皆自性意智慧而生何謂也此蓋爲從無入有以立陰陽陰陽分四象四象入中央具五行自然奪天地造化萬物從而生焉人能達此反取陰陽眞氣補攝毁敗之軀受五行造化氣足自然達於聖位但是人身元從無入有無功而成功非是容易而得之今却依根本而修自凡入聖蓋從有作實非難也已上所論却依法作用即三十日氣備三百日造化成便得體象俱備身既得就神氣精用爲主也神者土氣也氣者金水之氣也精者火木之氣也此乃謂之三奇神氣精然隨母之榮衛經絡周身引行至中宫鬲元宫於母變乳下十日内生膜一重其膜上生金液白膏三十日内其膏滿溢奔凑而出流入元宫灌溉所聚者神氣精也四十日内又生膜一重至六十日第二重膏滿足奔凑而出流入元宫第三重膜閉留爲積至七十日膜生三重九日膏滿第三重膏滿奔凑而出流入元宫第四重膜閉留爲積自後每三十日生一重閉一重三百日内生膜九重閉盡九重然後三百日奪天地造化血肉筋骨皮毛並就故膜不生身既得成而降生於世然後取積乳九重用爲食一年食乳三重三年食乳九重盡方得神全氣備也既得體備氣全方取百味五辛之物而用爲食自口而入過十二重樓肺乃受之傳於腎腎傳於肝肝傳於心心傳於脾脾者土也能生萬物能殺萬物殺者殺五辛百味之滓化歸大小便是也生者生百味五辛之津歸於元宫却是父之一點眞精所住之處故曰元宫在臍下三寸方圓四寸名曰大海之中有神龜左鼻能收右鼻能出中取脾藏所生百味五辛之津轉行周天數足却於右鼻中出自坎宫上朝於舌下二竅中出左爲玉液右號華池起於舌聚嚼至濃候滿口復咽至十二重樓肺復受之蓋經元官神龜行周天數足更不行於諸藏惟傳於心心有三毛七孔别有一穴號曰聚涎穴其宂有三竅其涎自中竅所傳灌溉一身洗滌五藏左竅行榮右竊行衛一名榮衛二名龍虎三名人中血脉此血脉度人皮毛下行周天數足方化爲血血中血化爲肉肉中肉化爲筋筋中筋化爲骨骨中骨化爲髓髓運即成精前自十二重樓後自太和玉枕已上九宫中出者皆精也自已下三百六十骨節間皆是髓只如陰陽運動必先動其神然後動其氣後方動其精精降則陰陽相合是生身之根本也人能達此機依法而修的是修眞之要也問曰上文舉人身初受父母一點眞氣三十日氣備又言三百日造化方得體象俱全而降生於世承金液白膏之力方活於身今已細思三十日氣備依根本造化之功如何作用三百日造化之法如何施攝次後三年金液白膏又從何而得答曰然昔天地未分受大道眞氣而入於中元先分陰陽次立三才乃分四象次具五行配六律生七氣變八卦成九宫森羅萬象用日月分晝夜百刻十二時中用刻漏爲準已上事三十日氣備三百日體象俱全此自道也從秒至分從分至刻從刻定時從時立日從日定候從候定節從節定氣氣上立年已上大定用刻漏爲準也人初受父母眞氣於交感穴一同天地造化三十日氣備暗奪天地三百日造化方得體象俱全白膏金液是三百日積聚之物若達此機依法而修行可作神仙也所有三十日結氣之功三百日造化之法並在下卷該載玄機今既略備依法子細論之爲人曾犯破三奇元神不能具足故於中卷内先論修身養命補氣全神是天地微機生人妙㫖故將此法備於下卷如後之學者但先修身然後養命功若不闕無不準的如得者慎勿輕泄天機若容易輕泄立招殃禍永沉下鬼切在珍重寳惜非人勿泄戒之慎之混元八景眞經卷之二
