body:
  text: 三機初機之法共五篇陰陽等三元四象五行生數成數氣數氣候分三等及合内外逆順命機之法共八篇論太陰太陽眞氣逐日下時聚散去住貫串分内外應用丹藥功運次第造化天機之法共五篇論合文立壇象分刻漏定日月交合去住弦望晦朔四季變易五日一候四十五日一節九十日一時内外相會行持通計一十八篇初機法三乘之道即有三乘九品出身並各不同上有上道三品行抱一守中莫非龍汞虎鉛之金丹也中有中道三品行神水華池莫非虎鉛龍汞之大藥也下有下道三品行運精採氣莫非乾汞坤鉛之大功也已上九品立身之肇基皆自鉛汞而成鉛汞者天地萬物之宗祖也又汞者本出於木是木之精又鉛者自白金而有是金之氣木即是龍金即是虎古仙歌曰若識金精得之長生金精是鉛汞會成丹鉛汞相投神仙可求鉛汞相凝道無不成若遇眞鉛可以身延又云下士若達眞鉛汞歷盡春秋萬萬年故非鉛汞不能立之鉛汞者是眞陰眞陽也方是眞道乾汞坤鉛下乘三品岀身大功章乾汞者父之精坤鉛者母之氣二氣暗合陰陽交會機宜奪造化成人又父者木也精者火也母者金也氣者水也金木水火謂之四象土制之共聚爲寳其數滿二十四氣隨榮衛運轉周身日用九十六度其數又滿三百八十四陰陽氣足準此三十日氣圓三百日形體俱備降世爲人人能返用生身二氣施攝於身奪天地造化受陰陽氣數滿足變凡入聖故曰乾汞坤鉛之大功大功者蓋人因乾汞坤鉛之二氣合而成形今却投造化修鍊乾汞坤鉛氣滿謂之神符神符氣備謂之白雪白雪氣備反變乾汞坤鉛入於至道故曰大功人若自生身無破犯元神神與氣全達大功之機修鍊功圓是爲下乘上品住世號曰神仙若中年已破犯可半得大功之機修鍊功圓是爲下乘中品住世號曰地仙若老年之極其神氣破犯三分之二而得大功初機修鍊功圓是爲下乘下品得滿於常壽脱殻得爲地仙此是下乘三品之位也虎鉛龍汞中乘三品大藥氣章虎鉛者白虎之眞氣也白虎者金也金者陰也陰者眞陰也又鉛者白虎中眞氣所聚之物故曰虎鉛龍汞者青龍之眞精也青龍者木也木者陽也陽者眞陽也又汞者青龍中精眞氣所成之物故曰龍汞也龍汞與虎鉛相合得土恩育三百日造化爲黃芽黃芽氣既備變凡爲聖故日大藥且如龍與汞龍屬木汞屬火火之氣數滿三木之氣數滿九三與九共十二也虎與鉛者虎屬金鉛屬水金之氣數滿七水之氣數滿五五與七共十二四象之氣共二十四以應一月之用又龍位居卯而虎位居酉卯酉之位金七氣木九氣合數得十六應一斤之用卯即是木木即是陽也酉即是金金即是陰也陰中有三陽神神氣精陽中有三陰神神氣精三陽三陰共得六神外象即六爻配金木二氣爲八節八卦也每卦又復出八卦共八八六十四數卦次復準此相生相合而生三百八十四爻主身之神既生已上神足是身自有主故曰虎鉛龍汞之大藥且大藥者是太陰眞氣爲萬物之母世中萬類皆不離母氣而生故暗奪天地造化交合之機宜又取太陰眞氣合太陽眞氣交合得中央眞土恩育氣備謂之黃芽黄芽氣備謂之大藥若自身元無觸犯神與氣全得大藥之機者修鍊功圓是中乘上品號曰中乘上仙若中年已下犯之可半得大藥之機修鍊功圓是中乘中品號曰中乘神仙若老之極甚而犯三分之二而後得大藥之機修鍊功圓是中乘下品號曰長壽地仙此是中乘三品之位也龍鉛虎汞上乘三品金丹章龍鉛者龍本無鉛自虎而有蓋取白虎眞鉛歸青龍元宫投陰陽交合時火候運用氣足化爲玄珠此珠雖是四象之氣獨體未能變化復入白虎元宫恩育故曰龍鉛也虎汞者虎本無汞自龍而生先取白虎眞鉛伏住青龍眞汞其龍汞既受虎鉛制伏以備陰陽之氣後復入白虎元宫故曰虎汞也又二十四氣此二氣合四象備二十四神光玄珠已備二十四氣復入白虎元宫又備二十四氣乃兩度受四象灌溉五行造化氣備號曰金丹人得之便爲天仙此是神仙之上道也故日龍鉛虎汞之金丹且始金丹是太陽之眞氣受眞鉛結伏氣備成玄珠復入白虎元宫蓋因金得氣而生故謂之金丹號曰水中金三百日造化既足大小如櫻桃色如鮮血紅紫射人有光艷蓋從金而産故謂之金丹若得此丹上曰上乘天仙中曰中乘神仙下曰下乘大仙若將三等鉛汞齊施修鍊功圓超三乘位達於上境謂之眞君上爲上清上位眞君中爲上清中位眞君下爲上清下位眞君下士若達三乘鉛歷盡春秋萬萬年已上三乘分出九品超乘又分三位共十二數故有十二分入於乾汞坤鉛理也陰陽三元四象五行生成氣候氣數法則相合持氣章夫行持者與内外氣候相合作用不差無不達也陰數一百九十二陽數一百九十二共得三百八十四三元者天地人各位三十六共得一百八並四象金七水五木九火三共得二十四兼中宫土氣數五以五五呼四象入中宫共得一百二十則候者天地日月交合行用氣候周身氣一帀却從元宫上朝於舌下津生滿口爲一候也此蓋縁先從脾藏生殺百味五辛之物殺者殺穢濁之滓而入大小二事生者生百味五辛之津入於元宫神龜所受於左鼻中收百味五辛之津轉行周天數足於右鼻中出自坎宫上朝舌下二竅中生津液滿口號曰一候如强漱取者宫氣多不全不入元宫此爲不足之氣故須知氣候但依法行持陰陽三元四象五行數足無不達也但候滿口津液咽歸十二重樓肺先受之肺爲萬物之母萬物皆因母氣而生故始傳於肺肺者西方之正氣生數四五行乘之得九氣數七但候行七轉於腎腎者北方之正氣生數一乘之得六氣數五但行五轉轉於肝肝者東方之正氣生數三乘之得八氣數九但行九轉傳於心心者火也南方之正氣生數二乘之得七氣數三但行三轉傳於脾此是子母相傳自然之道且如四象滿二十四氣數五五呼四象俱入中宫得五行之氣號曰一周天凡行四象之氣須是依行氣之法但將六門俱閉候極不任便方用力咽之每咽分三咽送氣直至元宫令神龜左鼻納之却候氣匀返想神龜右鼻出散分周身上朝於舌下及夾脊雙關通於腦返再咽閉氣候力極不任復咽之準前送至元宫令神龜左鼻中納一名運氣二名行火三名通行榮衛凡欲行氣先須行火假令行之肺先行火一度故得肺氣通入百關肢節無不至處肺行七轉又行火一度要通腎藏之氣腎行五轉又行火一度要通肝藏之氣肝行九轉又行火一度要通心藏之氣心行三轉准法行火五度四象俱受中宫大乘之炁方得備四象五行生成氣數周足故曰周天四象俱備陰陽氣足入造化氣章且如四象得備二十四氣但依時候如法行持一十六周天共得三百八十四備陰陽氣數滿足内外自合根本立身造化之理皆天地未分禀陰陽而生之所自亦自陰陽而有今既得備陰陽氣滿足何慮身無主掌身既有主掌自然乆視且陰陽立三才分四象四象列五行五行生六律六律分七政七政變八卦八卦變八八六十四卦每卦分六爻神合三百八十四爻神亦補陰陽氣足外即生三百八十四爻神内即生三百八十四主身精光神遞互相生外備森羅萬象一萬二千形影神一萬二千岀入神一萬二千眞氣神内備三萬六千神此是天地造化自然之道若至身神氣無差不曾破犯捉天地造化作用無差内外自然相合若曾犯破及老殘不可行之爲當年少曾以歌歡恣慾而使元神枯敗氣羸精弱内氣與外氣不能相合若得此玄機者但令專心靜念全神合時候行持雖不致神仙亦能住世滿於常壽既滿氣不能進自盡而死矣爲脱殻之地仙此蓋修攝之時無元修身養命之機只有聚性全神之法且如人當初受二氣成人身其氣於身各有程限程限既盡遂不能進故致於死又身是氣之舍氣是身之主主去室空室空身壞主無存處故凡修行先須修身補氣候身與氣全然後可養命無不達也若不見修身補氣之法只得養命之機將見在神氣聚身苟不能進則氣盡而死但只性識不散脱殻而爲地仙如復有老而悟者但先修身補氣然後養命自然超達老用少氣補攝章老陰奪少陽陰命自然昌老陽奪少陰陽齡死不侵人若悟此法者可以救老得少返老還童老既致少更有何異道但依根本而修之自然返老歸少根本者眞氣也直氣若得存留變化爲神仙眞氣若少復返爲人根宗只一氣爲種感陰陽造化復變爲根種故無窮盡人若本元眞氣無破犯捉天地造化行持可爲神仙也若有毁敗將見在神氣行持可超常壽爲地仙也若能將眞氣施設於身依日月交合作用受造化氣足自然通靈若毁之極甚者取黑鉛鐄一十六兩已下取鉛畢將鐄爲鑪鉛鐄者西方正氣白金是也其鐄鑪上等用五斤以下用四十五斤中用九十斤上用五斤每日一用應五日一候若四十五斤四十五日一用應四十五一節若九十斤九十日一用應九十日一季之節候且如五日一用縁恩養五日氣候爲藥四十五日復用者四十五日氣候並爲藥也九十日一用者九十日氣候並總爲藥每用從冬至日接一陽生起首須是逐日换鑪又須要好者不犯九醜十惡體潤性柔者方可爲鑪鑪有八門九竅其氣上下通行其要有三路三路氣出上中下三門三門中氣不犯五日自然盈溢四十五日盈溢至甚九十日氣至極蓋自然也上中二門取食用下一門行氣運用爲奪鼎鑪之氣返取修身故須擇身無病氣盛體潤性柔氣和者堪用也和柔性快者上好也修之三年超凡爲地仙也且人雖曾犯破已又不可犯之俱盡犯之既盡人即自死人既未死蓋有見在神氣爲主但將見在神氣修令堅固候滿常壽脱殻爲地仙若又能補益而修者定證神仙也入虎鉛龍汞理矣眞五行定命氣章夫人立命須認五行解定金鎖養就玄珠存神於元宫伏氣於腎内回精上朝於太和此入聖之門也五行者眞五行也非東西南北中金木水火土五行也此五行者蓋是配象有名無形五行眞象名具形體又非人之五藏人之五藏亦是眞五行結就也惟土無正形生成造化皆因土也外生天地内備人身眞金者人之母也眞木者人之父也眞水者金之氣也眞火者木之精也眞土者母之元宫也四象生炁聚入元宫得土制之造化成人人身四象氣聚五行造化無一物不成形質既要修行但只依根本造化神仙自然而出故須認得五行定却金鎖金鎖者謂得眞鉛伏住眞汞共聚爲寳金鉛結伏其汞故曰玄珠金鎖二氣結伏造化爲珠存神爲元宫謂四象眞氣生就萬神致於元宫也存養伏氣於腎内者謂玄珠備二十四氣復生三百八十四氣將此氣伏於腎内謂之伏氣回精上朝者令身内神氣隨榮衛運轉往來造化爲回精之道又曰金精二氣相合法兼結氣功章夫二氣者虎鉛龍汞也虎鉛者聚即元宫爲寳散即周身爲氣氣來即聚氣聚即合氣散即運故不得有差失結氣者二氣相見其氣方結假令朔後一日癸時太陰氣來依時取鉛眞氣降鉛亦降取歸青龍元宫豈獨一氣而得備乎故得二氣方能備也又虎鉛者是白金之眞氣取白金一十四兩已下十三兩已上於靜室内香水浴過用藥昏却本性候時至而取之如常不令外氣所犯如犯外氣者不入元宫隨滓而出如依時取得眞鉛便令二氣相合結之若是癸時取得丑時便合如取得復令金木相會尅受金之所尅其情必動情既動則眞氣降眞氣降欲則泄制令勿泄則二氣自然相合也次後日時準此又結氣者爲眞鉛結住眞汞謂四象五行備也是人立身之根本也且人身之立三十日氣備三百日造化方得成形此立身之處本位元住白虎元宫坤家所住坤者眞土也四象眞氣得土爲主故不能毁壞尚自毁損不一可況令反取二氣致青龍元宫此住處其氣無類故别有三十日恩養法三百日造化機若達此機得天地造化何慮此身不作神仙也三十日恩養者二氣相合結氣之後不得更有作用及諸思慮專遣同道二人則候時刻内外相合得四象氣足入至中宫滿陰陽正數極致三十日自然凝結如行氣候不滿及數不足氣難得備故須專志恩養三十日以後三百日亦足天地造化合内外行動無不達也五行各現本色與内外相應章凡行五藏氣者看逐季月日與内外相應合行持且如肝藏屬木旺春三月内選甲乙日時端坐正身絶慮忘思密閉地户大啓天門出入綿綿不令奔逸一心使榮衛運轉肝藏氣自夾脊雙關上通致腦自頂門而下降入口中咽漱歸十二重樓先傳於肺肺傳於腎腎傳於肝肝傳於心心傳於脾脾傳入於元宫神龜所受神龜行周天數足自奔而流上歸舌下二竅中出其色青是肝家一藏眞氣順也餘四藏倣此且如肝藏氣初行之時於春三月内甲乙日時起首此已上並是肝家行旺則無諸藏氣雜只獨以本氣榮衛周身徑路五藏周天數足生得者氣用資於身其中至精納於元宫亦是五行生殺其氣在本位不復出至春三月再選甲乙日時乃復施行之於元宫積者肝藏眞氣復出再經五藏榮衛周身故致本凑而出現者别無異色只是純青之氣餘四藏倣此若得五藏各具本色而現是爲的驗也定金鎖章金鎖法者取白虎首經謂之眞鉛二七十四二八十六并三五十五乃爲上也取時須潔淨莫令外氣所犯如犯外氣不入元宫隨滓而出又金者西方之眞氣眞氣者眞鉛也鉛者白虎之眞氣窟宅又鎖者鎖閉也閉青龍眞氣不令散失使無漏泄也青龍眞氣者眞汞也眞汞者是青龍至精之窟宅也龍虎至精是四象眞氣所化故無形質且鉛汞者各具本體土能制之其氣得鉛汞方立體象共爲二氣二氣相逢自然成寳也故用機密暗取白虎眞鉛歸青龍元宫所有鉛者本是白虎元宫所住之物却歸青龍元宫惟不受所犯故住青龍元宫元宫既有眞鉛鉛能制汞汞既逢鉛自然相戀更不散失而爲曰金鎖也入龍鉛虎汞理矣混元八景眞經卷之四
