front:
  text: 混元八景眞經卷之三女七
  hash: sha256:e6bc8ee6d7e8499f02f59ed1540255d430e0741a9bae1d57b6de6da8ff01c9b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0041_HFL_003-001a, image: hfl/0344/0344-052.png}
body:
  text: 混元眞人曰自爲問答所喻事理言說不盡若統其說恐學人難曉是故並論根元問難令人省會天機秘隱大功大藥金丹細分之法著在五卷之内問曰上文舉陽消陰補物極元補令人細尋根本依本來處修之又見世間萬物有情無情以及於人自無形而生有形無質而至有質形質既具暗取天地五行之氣用質於身故得體備氣全却被陰陽五行返逆其氣不合於天道而行動漸令衰朽以至凋殘何謂也答曰知世中萬物不可謂長而無長可接不可謂短而無短可截故知長短高下各有所宜既至於宜謂之定定而乆不修謂之極極而乆不修必致於毁既至於毁時但修於根源依元本而修必得合於天地況世中萬物雖有形質不具於靈通故不能致於斯也萬物之中惟人最貴最靈至於毁敗任自亡形尚不能尋究根源用修於身何況異類乎今留此書於世令後人知有長生之路不死之門若能依法而修無不至神仙者也問曰前卷内云爲人曾犯破元氣不能合於天地運動令人先修其身然後養命須自究本源知本元依法而作用無不準的其理何謂答曰然修身者須見天道眞氣運動機宜夫天道眞氣者有聚有散有往有來人之眞氣亦然也只如人身初得暗合天地機宜且人之眞氣亦然有聚有散有往有來聚則元宫爲寳散即周身爲氣若欲修身但投天地氣候相合而用自然準驗若不見天地機宜雖得根源而修多不能遂蓋爲眞氣聚散往來不定其細分並在後卷凡欲修身先須除病無病即身安身安即神寧身患即神亂只爲人身有患者自然神不寧自身與神尚不能寧何由更取外氣合於内氣安能準的也但先令身無病患然後依法而修自然準驗也夫人之疾病皆因五藏不和榮衛難通致使患生但先修身令自身氣順氣順則神明然後調和五藏次治榮衛使氣往來莫虧常則無令有滯氣順則五藏相生氣逆則五藏相尅氣順則有病自除氣逆則無病生病五藏氣順榮衛周行往來無滯五藏氣逆百脉俱滯榮衛難通故知神亂則周身神氣皆亂何由更能取外神氣乎今備將降氣除病之理具載于後法曰但看時候刻漏不差即便起功先導引四肢經絡次舒展手足令百節開通然後動撼渾身使氣往來無滯若學人曾遇明師者知戌亥子三時是施功之時也故宜安置安置既定陰氣自旺陰氣既旺人即寢寐人既寢卧於床枕氣脉滯於百節故先引氣令往來無滯方用其功神當自明矣夫神明者陰陽不測之謂神日月晴朗之謂明舉意動機之謂神應用不差之謂明只謂人處於世不論大小所求之事無有不遂者此蓋用神明矣如求之不遂者蓋用神之不明也如求之不遂者是用神不神故不明也神不明者是人機不微妙也若人用機微妙萬神皆明萬事皆成意無不遂也既得意遂謂之神明若用神明先用其神端然正坐絶慮忘思候神與氣俱定乃鼻納口呵鼻納者收清氣也口呵者出濁氣也人食百味五辛皆有刑尅腐人五藏使人患生清被濁而渾之清自難見故呵淘濁之氣淘濁畢令心氣只於鼻出入鼻中出入者輕清之氣也輕清之氣者陽也口中出入者重濁之氣也重濁之氣者陰也鼻爲天門口爲地户口通五藏五藏所出者只是穢濁之氣鼻通六腑六腑所出者只是輕清之氣清濁兩路各别而行故只令鼻中氣自往來恐濁氣輝於清氣所有鼻中取氣只須是緩緩綿綿不令耳聞乃爲要妙使輕清之氣經營五藏榮衛周身冲開四肢百節變滯通行使無阻塞若夫從天門自在出入即不能通遊百關肢節故須綿綿出入但初淘濁畢閉了地户留了天門令神與氣相守只抱元陽是守一之道也候百脉骨節通暢關節俱開往來流利然後取百味五辛已成之津鍊爲神水添入元宫爲寳是抽添之理也取者取元宫經脾藏所生百味飲食五辛之津引元陽眞氣令神氣隨榮衛而運行自夾脊變關通於腦前至頂門而往返降眞氣下入口便潄咽歸十二重樓入肺乃傳於腎腎傳於肝肝傳於心心傳於脾脾之所受更無殺之物俱生入於元宫養於神龜所受其神龜然則有白丹砂上朝於舌下五行生殺三度五行生殺化爲神水遂以三五經修鍊成寳更不復傳諸藏惟傳於心心有三毛七竅别有一穴號曰聚涎穴有三竅其涎自中竅所傳復入於藏之左右竅所傳度入皮膚下化爲榮衛行周天數足化爲血血化爲肉肉化爲筋筋化爲骨骨化爲髓髓運成精鍊入元宫爲寳此爲眞一是水中金也此金三度經五行生殺號曰三五一也鍊成一氣故號爲一又三者木也木應爲春萬物自春而發生木者陽也天也五者土也萬物無不由土而生土者陰也地也木精眞氣就於土土將木精鍊爲至寳是三五一也夫三五一者乃天地之機微生身之妙㫖若達此機可以超凡入聖上達仙都也問曰應推窮人身所立蓋自虚無體象從何處得答曰蓋因龍虎相合鉛汞交併非小小之事大道天地萬物之縁成相投氣合於中元得成體象若論龍虎根元六合之内無有離此而出也若達此眞的根元神仙如觀掌内且龍生汞虎生鉛眞鉛眞汞若得相伏道合自然但將鉛汞法而修無不準也所有龍虎鉛汞釋爲下文問曰願聞修眞之妙理答曰然上文舉令人究根元依本元而修且人是父母眞氣所化木是人之父也土是人之母也父母眞氣返變成人便是三五一也此是眞的立身之根元也人但使五藏相順榮衛流行通暢無諸疾病後乃修身無不準也問曰且人父母眞氣所化暗奪天地造化成人何不依本根元而修却取陰陽眞氣奪天地造化用修於身無不至神仙者也又究根元始於體象俱備身形三百日氣足降世爲人厥號嬰兒東西未離南北不分修何法而立於體得何氣而養於身答曰且嬰兒者無思無慮無著無貪饑寒之外更無一事故得神定氣寧漸加殊聖以立於身只此法也得氣者得母積乳之氣也是人本出於陰陽二氣二氣者四象也一氣生二象二象生四象交加於中宫故備五行五行共聚奪天地造化成人三十日内立就乾坤世界於母雙乳下生金液之津取用爲食餘者留于積乳三百日積乳九重此降世而要食用此積乳之氣自然增長學人若達三百日天地造化之大功者但依本法而修自然達於神仙超凡入聖若要修身者但依本法先令氣順無諸疾病便乃修身修身者豈忘元基哉所有修身結氣之功一切細微妙用機法並是玄奥之機述在後卷問曰上文舉凡夫欲養命先須修身去除疾病令人將津液鍊爲神水返鍊神水爲寳寳者藥也元宫有藥有病自除遂便依法而修其津液津液又不能爲神水神水又不能爲至寳惟當法不正惟當錯用功答曰法無不正功亦不錯蓋五藏眞氣未能相順故致如斯但先將五藏眞氣制令相順五藏眞氣順則將津液三返鍊爲神水神水返鍊爲藥若五藏氣逆於榮衛亦不能順行更何况鍊氣爲寳乎問曰五藏如何得氣順願聞法要答曰内即五藏外即五行但究五行元立之機依法元立而用修五藏自然相順也五行者金木水火土也木者位居甲乙純行陽道生自丙寅卦主震其象青龍也謂自水而得氣故象青龍也氣數九九氣足即生火其治丙丁火數二卦主爲離其象朱雀離中陰也陰者爲受青龍之氣也此二象只是一氣木是主火爲用也金者位處西方庚辛純行陰道生自壬申卦主爲兌其象白虎也爲從土而得氣故象是虎也氣數七七氣足合得水其治壬癸氣數五卦主爲坎其象玄武坎中陽也陽者爲受白虎之精也此二象只是一氣金即爲主水即爲用也金木水火若成四象遇土而相生不遇土而相尅土者處於中央戊己是帝之位土數五具五德旺於四季解制四象其氣能生殺萬物故云土者是五行之首也五行者蓋從陰陽所出人之五藏豈離於父母所生當本受於父母精血二氣交感被土制之方乃成形父精者眞木火也母血者眞金水也母之元宫者眞土也金木水火被土制之不能散失各具本性生性意智慧而具四象配入中央乃立五行五行即五藏方可生萬物萬物者即是人之筋骨皮毛以及萬神故得俱備成人人若能返取陰陽眞氣合造化修攝於身何慮不作神仙也已上並略言之此是五藏所得之位也但却依此根本而修必得五藏相順有病自除既能無病方可修身身既得金然後養命無不致神仙也問曰五行根源所立並知子細如何是修五藏之法答曰夫修五藏眞氣者須見五行之的稍不精研徒勞施工無由得遂也五行之實的者於九竅内驗之事無不準也何以知之縁五藏外通九竅肝通於兩曰心通於舌脾通於口肺通於鼻腎通於耳下通於二陰共爲九竅九竅既有滯則知五藏不順也五藏和平而氣無滯則九竅俱通利既無壅滯即便無病既無疾病即便無死既是不死即便長生此是於九竅中驗也又驗五藏中有無疾病氣候的驗各具本色而見是爲驗也假令肝青心赤肺白腎黑脾黃使五藏氣候鍊得本色現於面部是爲的驗也且如肝藏之氣肝應東方甲乙木其色青但依肝家獨法作用莫令諸藏氣相雜行持畢取而驗之只見青色更無諸色所現是爲肝藏氣順也餘四藏皆依此例如五藏各現作用畢各驗本藏氣候如不作本位之色是爲不順也如應本色而現是爲已順也如是五藏的驗氣候飢寒自如功至此飢寒尚不能著何更有外邪中風及一切惡而能爲病乎既是無病死亦無門人既不死即是長生此是五藏的驗法如後學人能將五藏氣順用得見的驗則爲地仙也混元八景眞經卷之三
